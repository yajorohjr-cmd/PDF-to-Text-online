<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Mpanova PDF ho Soratra - Haingana & Maimaim-poana</title>
    <meta name="description" content="Mpanova PDF ho soratra (Text) maimaim-poana sy haingana indrindra. Afaka mandika PDF ho amin'ny teny Malagasy, Frantsay, ary Anglisy. Tsy mila installation.">
    <meta name="keywords" content="PDF to Text, Malagasy, PDF converter, Hanova PDF ho soratra, OCR, Free PDF tool">
    <meta name="author" content="yajorohjr-cmd">

    <meta property="og:title" content="PDF To Text - Mpanova PDF haingana">
    <meta property="og:description" content="Havadiko ho soratra azo ovaina ny PDF-nao ao anatin'ny segondra vitsy.">
    <meta property="og:image" content="https://yajorohjr-cmd.github.io/PDF-to-Text-online/logo.png">
    <meta property="og:url" content="https://yajorohjr-cmd.github.io/PDF-to-Text-online/">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        :root {
            --bg-body: #f4f7f6;
            --bg-card: #ffffff;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --primary: #0984e3;
            --border: #dfe6e9;
            --input-bg: #ffffff;
            --success: #27ae60;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #f5f6fa;
            --text-sub: #b2bec3;
            --primary: #74b9ff;
            --border: #2d3436;
            --input-bg: #2d3436;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg-body); 
            color: var(--text-main);
            margin: 0; padding: 15px; 
            transition: all 0.3s ease;
        }

        .app-card { 
            background: var(--bg-card); 
            max-width: 550px; 
            margin: 10px auto; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .theme-btn {
            background: var(--primary);
            border: none; color: white;
            padding: 8px 15px; border-radius: 50px;
            cursor: pointer; font-size: 11px; font-weight: bold;
        }

        .logo-container { text-align: center; margin-bottom: 15px; }
        .logo-img { width: 70px; height: 70px; border-radius: 15px; object-fit: cover; margin-bottom: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

        h1 { text-align: center; color: var(--primary); margin: 0; font-size: 22px; }
        .slogan { text-align: center; font-size: 12px; color: var(--text-sub); margin-bottom: 15px; }

        .ad-space { 
            background: var(--bg-body); 
            height: 80px; margin: 15px 0; 
            display: flex; align-items: center; justify-content: center; 
            border: 1px dashed var(--border); 
            font-size: 11px; color: var(--text-sub); border-radius: 10px; 
        }

        .share-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .share-btn { padding: 8px 15px; border-radius: 5px; color: white; text-decoration: none; font-size: 12px; font-weight: bold; }
        .bg-fb { background: #1877F2; }
        .bg-wa { background: #25D366; }

        input[type="file"] { 
            width: 100%; padding: 15px; 
            margin: 10px 0; border: 2px dashed var(--border); 
            border-radius: 12px; box-sizing: border-box; 
            background: var(--input-bg); color: var(--text-main);
            cursor: pointer;
        }
        
        .btn-group { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        @media (min-width: 400px) { .btn-group { grid-template-columns: 1fr 1fr; } }

        .action-btn { 
            color: white; border: none; 
            padding: 15px; border-radius: 10px; 
            font-weight: bold; cursor: pointer; transition: 0.2s;
            font-size: 14px;
        }
        #convert-btn { background: var(--primary); grid-column: 1 / -1; }
        #copy-btn { background: #6c5ce7; display: none; }
        #download-btn { background: var(--success); display: none; }

        .progress-container { display: none; margin-top: 20px; background: var(--border); border-radius: 10px; height: 10px; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; border-radius: 10px; transition: width 0.2s; }

        textarea { 
            width: 100%; margin-top: 20px; 
            border: 1px solid var(--border); 
            border-radius: 10px; padding: 12px; 
            box-sizing: border-box; font-size: 14px; 
            background: var(--input-bg); color: var(--text-main);
        }
        
        #status { font-size: 13px; color: var(--text-sub); text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="top-bar">
        <select id="lang-select" onchange="changeLang()" style="padding: 5px; border-radius: 5px; background: var(--input-bg); color: var(--text-main); border: 1px solid var(--border);">
            <option value="mg">Malagasy</option>
            <option value="fr">Français</option>
            <option value="en">English</option>
            <option value="de">Deutsch</option>
        </select>
        <button class="theme-btn" onclick="toggleTheme()" id="theme-text">Mode Nuit 🌙</button>
    </div>

    <div class="logo-container">
        <img src="logo.png" alt="PDF Tool Logo" class="logo-img" id="main-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/337/337946.png'">
        <h1 id="title">PDF To Text</h1>
        <div class="slogan" id="slogan">Haingana - Mora - Maimaim-poana</div>
    </div>

    <div class="share-container">
        <a href="#" id="fb-share" class="share-btn bg-fb" target="_blank">Facebook</a>
        <a href="#" id="wa-share" class="share-btn bg-wa" target="_blank">WhatsApp</a>
    </div>
    
    <div class="ad-space">DOKAM-BAROTRA (Ads Area)</div>

    <input type="file" id="pdf-input" accept="application/pdf">
    
    <div class="btn-group">
        <button id="convert-btn" class="action-btn">Havadika ho soratra</button>
        <button id="copy-btn" class="action-btn" onclick="copyText()">Copier</button>
        <button id="download-btn" class="action-btn" onclick="downloadText()">Télécharger .txt</button>
    </div>

    <div class="progress-container" id="p-cont">
        <div class="progress-bar" id="p-bar"></div>
    </div>
    <div id="status">Safidio ny rakitra PDF...</div>

    <textarea id="output" rows="10" placeholder="..."></textarea>
    
    <div class="ad-space">DOKAM-BAROTRA (Ads Area)</div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const currentUrl = encodeURIComponent(window.location.href);
    const shareMsg = encodeURIComponent("Andramo ity tool mpanova PDF ho Text maimaim-poana ity! Haingana be:");
    document.getElementById('fb-share').href = `https://www.facebook.com/sharer/sharer.php?u=${currentUrl}`;
    document.getElementById('wa-share').href = `https://api.whatsapp.com/send?text=${shareMsg}%20${currentUrl}`;

    function toggleTheme() {
        const body = document.body;
        const themeBtn = document.getElementById('theme-text');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            themeBtn.innerText = "Mode Nuit 🌙";
        } else {
            body.setAttribute('data-theme', 'dark');
            themeBtn.innerText = "Mode Jour ☀️";
        }
    }

    const i18n = {
        mg: { title: "PDF To Text", slogan: "Haingana - Mora - Maimaim-poana", btn: "Havadika ho soratra", copy: "Copier", dl: "Télécharger", status: "Safidio ny rakitra PDF...", processing: "Eo am-pamakiana...", done: "✅ Vita!", alert: "Voadika ny soratra!" },
        fr: { title: "PDF en Texte", slogan: "Rapide - Simple - Gratuit", btn: "Convertir", copy: "Copier", dl: "Télécharger", status: "Choisissez un fichier...", processing: "Traitement...", done: "✅ Terminé!", alert: "Texte copié!" },
        en: { title: "PDF To Text", slogan: "Fast - Easy - Free", btn: "Convert", copy: "Copy", dl: "Download", status: "Choose a PDF...", processing: "Processing...", done: "✅ Success!", alert: "Text copied!" },
        de: { title: "PDF zu Text", slogan: "Schnell - Einfach - Kostenlos", btn: "Umwandeln", copy: "Kopieren", dl: "Download", status: "PDF auswählen...", processing: "Wird bearbeitet...", done: "✅ Fertig!", alert: "Kopiert!" }
    };

    function changeLang() {
        const l = document.getElementById('lang-select').value;
        document.getElementById('title').innerText = i18n[l].title;
        document.getElementById('slogan').innerText = i18n[l].slogan;
        document.getElementById('convert-btn').innerText = i18n[l].btn;
        document.getElementById('copy-btn').innerText = i18n[l].copy;
        document.getElementById('download-btn').innerText = i18n[l].dl;
        document.getElementById('status').innerText = i18n[l].status;
    }

    document.getElementById('convert-btn').addEventListener('click', async () => {
        const fileInput = document.getElementById('pdf-input');
        const output = document.getElementById('output');
        const statusBar = document.getElementById('status');
        const progressBar = document.getElementById('p-bar');
        const pCont = document.getElementById('p-cont');
        const btn = document.getElementById('convert-btn');
        const copyBtn = document.getElementById('copy-btn');
        const dlBtn = document.getElementById('download-btn');
        const l = document.getElementById('lang-select').value;

        if (!fileInput.files[0]) return alert("Safidio ny PDF!");

        btn.disabled = true;
        pCont.style.display = 'block';
        copyBtn.style.display = 'none';
        dlBtn.style.display = 'none';
        output.value = "";
        
        try {
            const file = fileInput.files[0];
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
            let fullText = "";

            for (let i = 1; i <= pdf.numPages; i++) {
                let percent = Math.round((i / pdf.numPages) * 100);
                progressBar.style.width = percent + "%";
                statusBar.innerText = `${i18n[l].processing} (${percent}%)`;

                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(" ");
                fullText += `[Pejy ${i}]\n` + pageText + "\n\n";
            }

            output.value = fullText;
            statusBar.innerText = i18n[l].done;
            copyBtn.style.display = 'block';
            dlBtn.style.display = 'block';
        } catch (e) {
            statusBar.innerText = "Error!";
        } finally {
            btn.disabled = false;
        }
    });

    function copyText() {
        const text = document.getElementById('output');
        const l = document.getElementById('lang-select').value;
        text.select();
        navigator.clipboard.writeText(text.value);
        alert(i18n[l].alert);
    }

    function downloadText() {
        const text = document.getElementById('output').value;
        const blob = new Blob([text], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "pdf-to-text-result.txt";
        a.click();
        window.URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
